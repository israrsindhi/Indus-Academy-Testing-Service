<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog & Notices — Indus Academy & Testing Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div data-ia-header></div>

<div class="noticeboard">
  <div class="container">
    <div class="noticeboard-label"><span class="pin"></span> Notice Board</div>
    <div class="notice-track" data-noticeboard></div>
    <div class="notice-dots" data-notice-dots></div>
  </div>
</div>

<section style="padding-bottom:0;">
  <div class="container">
    <div class="section-head">
      <div class="section-eyebrow">Blog</div>
      <h2>Strategy notes and study strategy from Indus Academy</h2>
      <p>Sorted from our own mock test data, not generic study tips.</p>
    </div>
  </div>
</section>

<section style="padding-top:24px;">
  <div class="container">
    <div class="blog-toolbar">
      <div class="sort-group">
        <button class="sort-btn active" data-sort="newest">Newest</button>
        <button class="sort-btn" data-sort="popular">Most Popular</button>
        <button class="sort-btn" data-sort="oldest">Oldest</button>
        <button class="sort-btn" data-sort="featured">Featured</button>
      </div>
    </div>
    <div class="post-grid" data-post-grid></div>
  </div>
</section>

<div data-ia-footer></div>

<script src="js/app.js"></script>
<script src="js/blog.js"></script>
</body>
</html>
