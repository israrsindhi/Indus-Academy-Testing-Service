<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Certificate — Indus Academy & Testing Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .verify-form { max-width: 420px; }
  .verify-form label { display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;}
  .verify-form input {
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:var(--radius);
    font-size:14.5px; margin-bottom:18px; font-family:var(--font-body); background:var(--paper);
  }
  .verify-form input:focus { outline:none; border-color:var(--emerald); }
  .verify-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items:start; }
  @media (max-width:780px){ .verify-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div data-ia-header></div>

<div class="noticeboard">
  <div class="container">
    <div class="noticeboard-label"><span class="pin"></span> Notice Board</div>
    <div class="notice-track" data-noticeboard></div>
    <div class="notice-dots" data-notice-dots></div>
  </div>
</div>

<section>
  <div class="container">
    <div class="section-head">
      <div class="section-eyebrow">Verification</div>
      <h2>Verify a certificate</h2>
      <p>Enter the certificate ID and passcode printed on the document to confirm it was issued by Indus Academy & Testing Services.</p>
    </div>

    <div class="verify-grid">
      <form class="verify-form" data-verify-form>
        <label for="cert_id">Certificate ID</label>
        <input type="text" id="cert_id" name="cert_id" placeholder="ITS-2026-0142" required>
        <label for="passcode">Passcode</label>
        <input type="text" id="passcode" name="passcode" placeholder="AM0142" required>
        <button type="submit" class="btn btn-emerald">Verify Certificate</button>
      </form>
      <div data-verify-result></div>
    </div>
  </div>
</section>

<div data-ia-footer></div>

<script src="js/app.js"></script>
<script src="js/verify.js"></script>
</body>
</html>
